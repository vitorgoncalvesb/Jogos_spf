<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jogos SPF</title>
  <style>
    :root{
      --bg:#090a13;
      --card:#12121e;
      --text:#f0f0ff;
      --muted:#8b95b2;
      --accent:#00d4ff;
      --accent2:#ff6b35;
      --border:rgba(255,255,255,0.08);
    }
    *{box-sizing:border-box;margin:0;padding:0}
    body{min-height:100vh;background:radial-gradient(circle at top left, rgba(0,212,255,.12), transparent 25%),radial-gradient(circle at bottom right, rgba(255,107,53,.12), transparent 20%),#090a13;color:var(--text);font-family:Inter,system-ui,sans-serif;display:flex;align-items:center;justify-content:center;padding:24px}
    .menu{width:100%;max-width:720px;background:rgba(18,18,30,.95);border:1px solid var(--border);border-radius:24px;padding:2rem;box-shadow:0 30px 80px rgba(0,0,0,.35)}
    h1{font-size:clamp(2.5rem,4vw,3.5rem);margin-bottom:.5rem;text-align:center}
    p{color:var(--muted);text-align:center;margin-bottom:2rem;max-width:680px;margin-left:auto;margin-right:auto;line-height:1.6}
    .choices{display:grid;gap:1rem;grid-template-columns:1fr 1fr;margin-top:2rem}
    .choice{background:#11131f;border:1px solid var(--border);border-radius:18px;padding:1.75rem;display:flex;flex-direction:column;gap:1rem;transition:transform .2s,background .2s;cursor:pointer;text-decoration:none;color:inherit}
    .choice:hover{transform:translateY(-4px);background:rgba(255,255,255,.04)}
    .choice h2{font-size:1.35rem;letter-spacing:.02em}
    .choice p{color:var(--muted);line-height:1.5;font-size:.95rem}
    .choice .tag{display:inline-flex;align-items:center;gap:.5rem;padding:.5rem .75rem;background:rgba(0,212,255,.08);border-radius:999px;font-size:.85rem;color:#a5f0ff}
    @media(max-width:620px){.choices{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <main class="menu">
    <h1>Escolha o jogo</h1>
    <p>Selecione um dos jogos disponíveis no projeto: Complete a Música ou Perguntados.</p>
    <div class="choices">
      <a class="choice" href="complete_a_musica/complete_a_musica_game.html">
        <span class="tag">Jogo 1</span>
        <h2>Complete a Música</h2>
        <p>Reproduza trechos das músicas e descubra a resposta antes do tempo.</p>
      </a>
      <a class="choice" href="perguntados/index.html">
        <span class="tag">Jogo 2</span>
        <h2>Perguntados</h2>
        <p>Responda perguntas de categorias e veja quais números de pergunta já foram usados.</p>
      </a>
    </div>
  </main>
</body>
</html>
