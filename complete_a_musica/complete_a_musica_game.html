<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🎵 Complete a Música — Evento Escolar</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@400;600;700;800;900&display=swap"
    rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box
    }

    :root {
      --bg: #0a0a12;
      --card: #12121e;
      --card2: #1a1a2c;
      --sala1: #00d4ff;
      --sala2: #ff6b35;
      --gold: #ffd700;
      --text: #f0f0ff;
      --muted: #8888aa;
      --success: #00e676;
      --danger: #ff4444;
      --border: rgba(255, 255, 255, 0.07);
    }

    body {
      font-family: 'Nunito', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow: hidden;
      position: relative;
    }

    /* BG animado */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 40% at 20% 20%, rgba(0, 212, 255, 0.07) 0%, transparent 60%),
        radial-gradient(ellipse 60% 40% at 80% 80%, rgba(255, 107, 53, 0.07) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    .notes {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }

    .note {
      position: absolute;
      font-size: 2rem;
      opacity: 0;
      animation: floatNote 8s ease-in infinite;
    }

    @keyframes floatNote {
      0% {
        opacity: 0;
        transform: translateY(100vh) rotate(0deg)
      }

      10% {
        opacity: 0.15
      }

      90% {
        opacity: 0.08
      }

      100% {
        opacity: 0;
        transform: translateY(-10vh) rotate(360deg)
      }
    }

    #app {
      position: relative;
      z-index: 1;
      height: 100vh;
      display: flex;
      flex-direction: column
    }

    /* ===== TELA INICIAL ===== */
    #tela-inicio {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      gap: 2rem;
      text-align: center;
      padding: 2rem;
    }

    .logo-titulo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(3rem, 10vw, 7rem);
      letter-spacing: 6px;
      line-height: 1;
      background: linear-gradient(135deg, var(--sala1), #fff, var(--sala2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: pulseTitle 3s ease-in-out infinite;
    }

    @keyframes pulseTitle {

      0%,
      100% {
        filter: brightness(1)
      }

      50% {
        filter: brightness(1.3)
      }
    }

    .logo-sub {
      font-size: 1.2rem;
      color: var(--muted);
      letter-spacing: 3px;
      text-transform: uppercase
    }

    .btn-iniciar {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2rem;
      letter-spacing: 3px;
      background: linear-gradient(135deg, var(--sala1), var(--sala2));
      border: none;
      border-radius: 16px;
      color: #0a0a12;
      padding: 1rem 3rem;
      cursor: pointer;
      transition: .2s;
      margin-top: 1rem;
      box-shadow: 0 0 40px rgba(0, 212, 255, 0.3);
    }

    .btn-iniciar:hover {
      transform: scale(1.05);
      box-shadow: 0 0 60px rgba(0, 212, 255, 0.5)
    }

    /* INPUTS NOMES */
    .nomes-input {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
      max-width: 500px;
      margin: 1.5rem auto
    }

    .input-grupo {
      display: flex;
      flex-direction: column;
      gap: .5rem
    }

    .input-grupo label {
      font-size: .9rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1px
    }

    .input-grupo input {
      padding: .75rem;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--card2);
      color: var(--text);
      font-family: inherit;
      font-size: 1rem
    }

    .input-grupo input:focus {
      outline: none;
      border-color: var(--sala1);
      box-shadow: 0 0 10px rgba(0, 212, 255, 0.2)
    }

    /* ===== JOGO ===== */
    #tela-jogo {
      display: none;
      flex-direction: column;
      height: 100vh;
      padding: 1rem;
      gap: .75rem
    }

    /* PLACAR */
    .placar {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      gap: 1rem;
      align-items: center;
    }

    .sala-placar {
      border-radius: 14px;
      padding: .75rem 1.25rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border: 2px solid;
      transition: all .3s;
    }

    .sala-placar.sala1 {
      border-color: var(--sala1);
      background: rgba(0, 212, 255, 0.08)
    }

    .sala-placar.sala2 {
      border-color: var(--sala2);
      background: rgba(255, 107, 53, 0.08)
    }

    .sala-placar.sala1.acertou {
      background: rgba(0, 212, 255, 0.25);
      box-shadow: 0 0 30px rgba(0, 212, 255, 0.4);
      animation: flash1 .6s
    }

    .sala-placar.sala2.acertou {
      background: rgba(255, 107, 53, 0.25);
      box-shadow: 0 0 30px rgba(255, 107, 53, 0.4);
      animation: flash2 .6s
    }

    @keyframes flash1 {

      0%,
      100% {
        background: rgba(0, 212, 255, 0.08)
      }

      50% {
        background: rgba(0, 212, 255, 0.4)
      }
    }

    @keyframes flash2 {

      0%,
      100% {
        background: rgba(255, 107, 53, 0.08)
      }

      50% {
        background: rgba(255, 107, 53, 0.4)
      }
    }

    .sala-nome {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.4rem;
      letter-spacing: 2px
    }

    .sala-placar.sala1 .sala-nome {
      color: var(--sala1)
    }

    .sala-placar.sala2 .sala-nome {
      color: var(--sala2)
    }

    .sala-pts {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 3rem;
      line-height: 1
    }

    .sala-placar.sala1 .sala-pts {
      color: var(--sala1)
    }

    .sala-placar.sala2 .sala-pts {
      color: var(--sala2)
    }

    .centro-top {
      text-align: center
    }

    .progresso-label {
      font-size: .85rem;
      color: var(--muted);
      margin-bottom: .3rem
    }

    .progresso-num {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2rem;
      color: var(--gold)
    }

    /* CARD PRINCIPAL */
    .card-musica {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 1.5rem 2rem;
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 1rem;
      position: relative;
      overflow: hidden;
    }

    .card-musica::before {
      content: '🎵';
      position: absolute;
      right: -20px;
      top: -20px;
      font-size: 8rem;
      opacity: 0.04;
      transform: rotate(15deg);
    }

    .musica-num {
      font-size: .8rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    .musica-artist {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(1.4rem, 3vw, 2.2rem);
      letter-spacing: 2px;
      color: var(--gold);
    }

    /* TRECHO */
    .trecho-wrap {
      background: var(--card2);
      border-radius: 14px;
      padding: 1.5rem 2rem;
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .trecho-texto {
      font-size: clamp(1.3rem, 3.5vw, 2.2rem);
      font-weight: 700;
      text-align: center;
      line-height: 1.5;
      color: var(--text);
    }

    .lacuna {
      display: inline-block;
      min-width: 200px;
      border-bottom: 4px solid var(--gold);
      color: var(--gold);
      text-align: center;
      padding: 0 .5rem;
      font-style: italic;
      letter-spacing: 3px;
      animation: blink 1.2s ease-in-out infinite;
    }

    @keyframes blink {

      0%,
      100% {
        border-color: var(--gold)
      }

      50% {
        border-color: rgba(255, 215, 0, 0.3)
      }
    }

    .lacuna.revelado {
      color: var(--success);
      border-color: var(--success);
      animation: none;
      font-style: normal;
      font-weight: 900;
    }

    /* CONTROLES APRESENTADOR */
    .controles {
      display: grid;
      grid-template-columns: repeat(6, minmax(0, 1fr));
      gap: .6rem;
      align-items: center;
    }

    .btn {
      font-family: 'Nunito', sans-serif;
      font-weight: 800;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      padding: .7rem 1rem;
      font-size: .9rem;
      transition: .15s;
      letter-spacing: .5px;
    }

    .btn-audio {
      background: var(--card2);
      color: var(--text);
      border: 1px solid var(--border)
    }

    .btn-audio:hover {
      color: var(--text);
      border-color: var(--muted)
    }

    .btn:hover {
      transform: translateY(-2px)
    }

    .btn:active {
      transform: translateY(0) scale(0.97)
    }

    .btn-sala1 {
      background: var(--sala1);
      color: #0a0a12
    }

    .btn-sala2 {
      background: var(--sala2);
      color: #0a0a12
    }

    .btn-revelar {
      background: var(--gold);
      color: #0a0a12
    }

    .btn-anterior {
      background: linear-gradient(135deg, #333, #444);
      color: var(--text);
      border: 1px solid var(--border)
    }

    .btn-anterior:hover {
      background: linear-gradient(135deg, #444, #555)
    }

    .btn-proximo {
      background: linear-gradient(135deg, #333, #444);
      color: var(--text);
      border: 1px solid var(--border)
    }

    .btn-proximo:hover {
      background: linear-gradient(135deg, #444, #555)
    }

    .btn-disabled {
      opacity: .35;
      cursor: not-allowed;
      transform: none !important
    }

    /* ===== TELA FIM ===== */
    #tela-fim {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      gap: 1.5rem;
      text-align: center;
      padding: 2rem;
    }

    .fim-titulo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(2.5rem, 8vw, 6rem);
      letter-spacing: 5px;
    }

    .vencedor-nome {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(3rem, 10vw, 8rem);
      letter-spacing: 6px;
      animation: pulseTitle 2s ease-in-out infinite;
    }

    .vencedor-nome.sala1 {
      color: var(--sala1)
    }

    .vencedor-nome.sala2 {
      color: var(--sala2)
    }

    .vencedor-nome.empate {
      background: linear-gradient(135deg, var(--sala1), var(--sala2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .fim-placar {
      display: flex;
      gap: 3rem;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2.5rem;
    }

    .fim-s1 {
      color: var(--sala1)
    }

    .fim-s2 {
      color: var(--sala2)
    }

    .btn-reiniciar {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.8rem;
      letter-spacing: 3px;
      background: var(--card2);
      border: 2px solid var(--border);
      color: var(--text);
      border-radius: 14px;
      padding: .8rem 2.5rem;
      cursor: pointer;
      transition: .2s;
    }

    .btn-reiniciar:hover {
      border-color: var(--muted);
      transform: scale(1.03)
    }

    .confetti {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 10;
      overflow: hidden;
    }

    .conf {
      position: absolute;
      top: -20px;
      width: 10px;
      height: 10px;
      border-radius: 2px;
      animation: fall linear infinite;
    }

    @keyframes fall {
      to {
        transform: translateY(110vh) rotate(720deg);
        opacity: 0
      }
    }
  </style>
</head>

        <button class="btn btn-proximo" id="btn-prox" onclick="proxima()">PRÓXIMA ▶</button>
      </div>

    </div>

    <!-- ===== TELA FIM ===== -->
    <div id="tela-fim">

      <div class="fim-titulo">FIM DE JOGO!</div>
      <div class="vencedor-nome" id="vencedor-nome">SALA 1</div>
      <div class="fim-placar">

      <button class="btn-reiniciar" onclick="reiniciar()">🔄 JOGAR NOVAMENTE</button>

  </div>

        dica: "Ele quer mostrar o coração pro mundo",
        audioStart: 93,
        audio: "Manchete dos jornais.mp3"
      },
      {
        artista: "Os Barões da Pisadinha — Já Que Me Ensinou a Beber",
        trecho: "Já que me ensinou a beber,",
        resposta: "Já que me ensinou a sofrer",
        dica: "Beber não resolve — é preciso esquecer",
        audioStart: 47,
        audio: "Já Que Me Ensinou a Beber.mp3"
      },
      {
        artista: "Tim Maia — Não Quero Dinheiro",
        trecho: "Quando a gente ama não pensa em dinheiro,",
        resposta: "só se quer amar",
        dica: "Tim Maia queria só uma coisa: amar",
        audioStart: 103.5,
        audio: "Não Quero Dinheiro (Só Quero Amar).mp3"
      },
      {
        artista: "Garota Nota 100",
        trecho: "Igual a você eu sei que não tem,",
        resposta: "De zero a dez te dou nota cem",
        dica: "Nota cem: todos querem essa garota",
        audioStart: 66.6,
        audio: "Garota Nota 100.mp3"
      },
      {
        artista: "O Rappa — Anjos (Pra Quem Tem Fé)",
        trecho: "Eu vou pedir pros anjos cantarem por mim,",
        resposta: "Pra quem tem fé",
        dica: "A mensagem central da música",
        audioStart: 41,
        audio: "Pra Quem Tem Fé.mp3"
      },
      {
        artista: "Rap do Solitário",
        trecho: "Amor, por que você me trata assim?",
        resposta: "Apenas quero te fazer feliz",
        dica: "Solitário = sem ninguém",
        audioStart: 22.7,
        audio: "Rap Do Solitário.mp3"
      },
      {
        artista: "Grupo Menos é Mais — Coração Partido",
        trecho: "Eu não vou negar que ainda te amo,",
        resposta: "Mas você merece o meu abandono",
        dica: "Às vezes ir embora é melhor",
        audioStart: 43.7,
        audio: "Coração Partido.mp3"
      },
      {
        artista: "Ferrugem — Arrependidaço",
        trecho: "De pagode em pagode, Mangueira,",
        resposta: "Portela, Copacabana",
        dica: "Ele procura em todo lugar do Rio",
        audioStart: 38.7,
        audio: "Arrependidaço.mp3"
      },
      {
        artista: "Natiruts — Sorri, Sou Rei",
        trecho: "Quando você se foi, chorei, chorei, chorei,",
        resposta: "agora que voltou, sorri, sorri",
        dica: "O título completo da música",
        audioStart: 92.4,
        audio: "Sorri, Sou Rei.mp3"
      }
    ];

    // =============================================
    // ESTADO
    // =============================================
    let qAtual = 0;
    let pts = [0, 0];
    let nomeSala1 = 'SALA 1';
    let nomeSala2 = 'SALA 2';
    let revelado = false;


    const audioPlayer = new Audio();
    audioPlayer.preload = 'auto';
    audioPlayer.volume = 0.9;
    let currentAudioStart = 0;
    let currentAudioEnd = 0;
    let audioPlaying = false;

    audioPlayer.addEventListener('timeupdate', () => {
      if (currentAudioEnd && audioPlayer.currentTime >= currentAudioEnd) {
        audioPlayer.pause();
        audioPlayer.currentTime = currentAudioEnd;
        audioPlaying = false;
        updateAudioButton();
      }
    });

    audioPlayer.addEventListener('pause', () => {
      audioPlaying = false;
      updateAudioButton();
    });

    audioPlayer.addEventListener('ended', () => {
      audioPlaying = false;
      updateAudioButton();
    });

    function prepararAudio(q) {
      if (!q.audio) return;
      const caminho = encodeURI(`musicas/${q.audio}`);
      audioPlayer.src = caminho;
      audioPlayer.load();

      if (typeof q.audioStart === 'number' && q.audioStart > 0) {
        currentAudioStart = Math.max(0, q.audioStart - 4);
        currentAudioEnd = q.audioStart;
      } else {
        currentAudioStart = 0;
        currentAudioEnd = null;
      }

      audioPlaying = false;
      updateAudioButton();
    }

    function toggleAudio() {
      if (!audioPlayer.src) return;
      if (audioPlaying) {
        audioPlayer.pause();
        return;
      }
      audioPlayer.currentTime = currentAudioStart;
      audioPlayer.play().then(() => {
        audioPlaying = true;
        updateAudioButton();
      }).catch(() => {
        audioPlaying = false;
        updateAudioButton();
      });
    }

    function updateAudioButton() {
      const btn = document.getElementById('btn-audio');
      if (!btn) return;
      btn.textContent = audioPlaying ? '⏸ PAUSAR TRECHO' : '▶ TOCAR TRECHO';
    }

    // =============================================
    // NOTAS MUSICAIS BG
    // =============================================
    const notasEmojis = ['🎵', '🎶', '🎸', '🎹', '🎺', '🎻', '🥁', '🎤'];
    function criarNotas() {
      const container = document.getElementById('notes');
      for (let i = 0; i < 16; i++) {
        const n = document.createElement('div');
        n.className = 'note';
        n.textContent = notasEmojis[Math.floor(Math.random() * notasEmojis.length)];
        n.style.left = Math.random() * 100 + '%';
        n.style.animationDelay = Math.random() * 8 + 's';
        n.style.animationDuration = (6 + Math.random() * 6) + 's';
        n.style.fontSize = (1 + Math.random() * 2) + 'rem';
        container.appendChild(n);
      }
    }
    criarNotas();

    // =============================================
    // FUNÇÕES
    // =============================================
    function iniciarJogo() {
      nomeSala1 = document.getElementById('nome-sala1').value.trim() || 'SALA 1';
      nomeSala2 = document.getElementById('nome-sala2').value.trim() || 'SALA 2';
      document.getElementById('tela-inicio').style.display = 'none';
      document.getElementById('tela-jogo').style.display = 'flex';
      atualizarNomesTimes();
      carregarQuestao();
    }

    function atualizarNomesTimes() {
      document.querySelector('[id="card-sala1"] .sala-nome').innerHTML = `🔵 ${nomeSala1}`;
      document.querySelector('[id="card-sala2"] .sala-nome').innerHTML = `${nomeSala2} 🟠`;
      document.getElementById('btn-s1').textContent = `✅ PONTO ${nomeSala1}`;
      document.getElementById('btn-s2').textContent = `✅ PONTO ${nomeSala2}`;
    }

    function carregarQuestao() {
      revelado = false;
      const q = QUESTOES[qAtual];

      document.getElementById('musica-num').textContent = `Música ${qAtual + 1} de ${QUESTOES.length}`;
      document.getElementById('musica-artist').textContent = q.artista;
      document.getElementById('prog-num').textContent = `${qAtual + 1} / ${QUESTOES.length}`;

      // Montar trecho com lacuna
      document.getElementById('trecho-texto').innerHTML =
        `"${q.trecho} <span class="lacuna" id="lacuna">_ _ _ _ _ _ _</span>"`;

      // Reabilitar botões
      document.getElementById('btn-s1').classList.remove('btn-disabled');
      document.getElementById('btn-s2').classList.remove('btn-disabled');
      document.getElementById('btn-rev').classList.remove('btn-disabled');
      document.getElementById('btn-audio').classList.remove('btn-disabled');

      // Desabilitar botão anterior na primeira questão
      if (qAtual === 0) {
        document.getElementById('btn-ant').classList.add('btn-disabled');
      } else {
        document.getElementById('btn-ant').classList.remove('btn-disabled');
      }

      prepararAudio(q);
    }

    function revelar() {
      if (revelado) return;
      revelado = true;
      const q = QUESTOES[qAtual];
      document.getElementById('lacuna').textContent = q.resposta;
      document.getElementById('lacuna').classList.add('revelado');
      document.getElementById('btn-rev').classList.add('btn-disabled');
      tocarTrechoInteiro(q);
    }

    function tocarTrechoInteiro(q) {
      if (!q || !q.audio) return;
      currentAudioEnd = null;
      currentAudioStart = typeof q.audioStart === 'number' && q.audioStart > 0 ? Math.max(0, q.audioStart - 4) : 0;
      audioPlayer.currentTime = currentAudioStart;
      audioPlayer.play().then(() => {
        audioPlaying = true;
        updateAudioButton();
      }).catch(() => {
        audioPlaying = false;
        updateAudioButton();
      });
    }



    function pontuar(sala) {
      if (!revelado) revelar();
      pts[sala - 1]++;
      document.getElementById(`pts-sala${sala}`).textContent = pts[sala - 1];
      const card = document.getElementById(`card-sala${sala}`);
      card.classList.add('acertou');
      setTimeout(() => card.classList.remove('acertou'), 700);
      document.getElementById('btn-s1').classList.add('btn-disabled');
      document.getElementById('btn-s2').classList.add('btn-disabled');
    }

    function anterior() {
      if (qAtual > 0) {
        qAtual--;
        carregarQuestao();
      }
    }

    function proxima() {
      qAtual++;
      if (qAtual >= QUESTOES.length) {
        mostrarFim();
      } else {
        carregarQuestao();
      }
    }

    function mostrarFim() {
      audioPlayer.pause();
      document.getElementById('tela-jogo').style.display = 'none';
      const fim = document.getElementById('tela-fim');
      fim.style.display = 'flex';

      document.getElementById('fim-pts1').textContent = pts[0];
      document.getElementById('fim-pts2').textContent = pts[1];

      const vEl = document.getElementById('vencedor-nome');
      const subEl = document.getElementById('fim-sub');

      if (pts[0] > pts[1]) {
        vEl.textContent = `🔵 ${nomeSala1} VENCEU!`;
        vEl.className = 'vencedor-nome sala1';
        subEl.textContent = `Parabéns ${nomeSala1}! ${pts[0]} × ${pts[1]}`;
      } else if (pts[1] > pts[0]) {
        vEl.textContent = `🟠 ${nomeSala2} VENCEU!`;
        vEl.className = 'vencedor-nome sala2';
        subEl.textContent = `Parabéns ${nomeSala2}! ${pts[1]} × ${pts[0]}`;
      } else {
        vEl.textContent = '🤝 EMPATE!';
        vEl.className = 'vencedor-nome empate';
        subEl.textContent = `Que jogo emocionante! ${pts[0]} × ${pts[1]}`;
      }

      document.querySelector('.fim-s1').innerHTML = `🔵 ${nomeSala1}: <span id="fim-pts1">${pts[0]}</span>`;
      document.querySelector('.fim-s2').innerHTML = `🟠 ${nomeSala2}: <span id="fim-pts2">${pts[1]}</span>`;

      lancarConfetti();
    }

    function reiniciar() {
      audioPlayer.pause();
      audioPlaying = false;
      updateAudioButton();
      qAtual = 0;
      pts = [0, 0];
      document.getElementById('pts-sala1').textContent = '0';
      document.getElementById('pts-sala2').textContent = '0';
      document.getElementById('confetti').innerHTML = '';
      document.getElementById('tela-fim').style.display = 'none';
      document.getElementById('tela-inicio').style.display = 'flex';
    }

    // =============================================
    // CONFETTI
    // =============================================
    function lancarConfetti() {
      const container = document.getElementById('confetti');
      container.innerHTML = '';
      const cores = ['#00d4ff', '#ff6b35', '#ffd700', '#00e676', '#ff4444', '#ffffff'];
      for (let i = 0; i < 80; i++) {
        const c = document.createElement('div');
        c.className = 'conf';
        c.style.left = Math.random() * 100 + 'vw';
        c.style.background = cores[Math.floor(Math.random() * cores.length)];
        c.style.animationDuration = (2 + Math.random() * 3) + 's';
        c.style.animationDelay = Math.random() * 2 + 's';
        c.style.width = c.style.height = (6 + Math.random() * 10) + 'px';
        c.style.borderRadius = Math.random() > .5 ? '50%' : '2px';
        container.appendChild(c);
      }
    }
  </script>
</body>
